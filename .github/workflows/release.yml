name: Create Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        name: Validate & Create GitHub Release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test

            - name: Create release
              uses: softprops/action-gh-release@v3
              with:
                  generate_release_notes: true
